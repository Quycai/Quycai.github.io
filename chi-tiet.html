<style>
:root{ --bg:#0b0b12; --card:#171722; --accent:#ff4fa0; --accent2:#8b5cf6; --text:#ffffff; --text-dim:#b0b0b0; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); color:var(--text); font-family:Segoe UI,sans-serif; overflow-x: hidden; }

/* THANH CUỘN */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 10px; border: 1px solid #222; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
::selection { background: var(--accent); color: white; }

.container{ max-width:1100px; margin:auto; padding:20px; }
.back{ color:var(--accent); text-decoration:none; font-weight:bold; transition: 0.3s; display: inline-block; padding-top: 10px;}
.back:hover{ transform: translateX(-5px); text-shadow: 0 0 10px var(--accent); }

/* KHU VỰC TIÊU ĐỀ */
.hero{ margin-top:20px; padding:60px 20px; text-align:center; border-radius:20px; background:linear-gradient(135deg, rgba(255,79,160,.25), rgba(139,92,246,.25)); border:1px solid rgba(255,255,255,.08); box-shadow: 0 0 30px rgba(255,79,160,.2); position: relative; overflow: hidden;}
.hero::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); animation: spin 10s linear infinite; z-index: 0; pointer-events: none; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.hero h1{ font-size:3rem; margin-bottom:10px; position: relative; z-index: 1; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
.hero p{ color:var(--text-dim); font-size: 1.1rem; position: relative; z-index: 1; }

.cover{ width:100%; margin-top:20px; border-radius:16px; max-height:550px; object-fit:cover; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.box{ background:var(--card); margin-top:20px; padding:25px; border-radius:16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }

/* TAGS & STATS */
.tags{ display:flex; flex-wrap:wrap; gap:10px; }
.tags span{ background:#252536; border:1px solid #444; padding:8px 14px; border-radius:999px; font-weight: 500; font-size: 13px; text-transform: uppercase; }
.tags span.author-tag { border-color: var(--accent2); color: #e2e8f0; box-shadow: 0 0 10px rgba(139,92,246,0.2); }
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-top:20px; }
.stat{ background:#252536; border-radius:12px; padding:15px; text-align:center; border: 1px solid #333; }
.stat h3{ color:var(--accent); margin-bottom:5px; text-shadow: 0 0 8px rgba(255,79,160,0.4); }
.stat p{ color:#aaa; font-size:14px; text-transform: uppercase; letter-spacing: 1px;}

.box h2{ margin-bottom:15px; color: var(--accent2); border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.box p{ line-height:1.8; color:var(--text-dim); }

/* BỘ ẢNH GAMEPLAY */
.gallery-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
.gallery-header h2 { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.nsfw-toggle { background: #252536; border: 1px solid var(--accent); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
.nsfw-toggle:hover { background: rgba(255, 79, 160, 0.2); box-shadow: 0 0 15px rgba(255, 79, 160, 0.4); transform: translateY(-2px); }

.gallery{ display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
.gallery img{ width:100%; height:280px; object-fit:cover; border-radius:12px; cursor:pointer; transition:.4s; border: 2px solid transparent; }
.gallery img.img-nsfw { filter: blur(25px); transform: scale(0.98); }
.gallery img.img-nsfw.revealed { filter: blur(0); transform: scale(1); }
.gallery img.img-nsfw.revealed:hover { transform: scale(1.03); border-color: var(--accent2); box-shadow: 0 10px 20px rgba(139,92,246,0.3); }
