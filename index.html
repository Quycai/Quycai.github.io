<!DOCTYPE html> <html lang="vi"> <head> <meta charset="UTF-8"> <meta name="viewport"
content="width=device-width, initial-scale=1.0"> <title>HPGVH18 - Kho Game Việt Hóa</title>
<style>
:root{ --bg:#0b0b12; --card:#171722; --accent:#ff4fa0; --accent2:#8b5cf6; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); color:white; font-family:Segoe UI,sans-serif; }
header{ text-align:center; padding:50px 20px;
background:linear-gradient(
135deg,
rgba(255,79,160,.25),
rgba(139,92,246,.25)
);
border-bottom:2px solid var(--accent);
}
header h1{ font-size:3rem; }
header p{ color:#bbb; }
.container{ max-width:1200px; margin:auto; padding:20px; }
.search{ width:100%; padding:15px; margin-bottom:20px; border:none; border-radius:12px;
background:#1e1e24; color:white; font-size:16px; }
.filters{ display:flex; gap:10px; margin-bottom:25px; }
.filters button{ border:none; padding:10px 15px; border-radius:10px; cursor:pointer;
background:#252536; color:white; }
.filters button:hover{ background:var(--accent); }
.games{ display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px; }
.game-card{ background:var(--card); border-radius:16px; overflow:hidden; transition:.3s; }
.game-card:hover{ transform:translateY(-5px); }
.game-card img{ width:100%; height:220px; object-fit:cover; }
.info{ padding:20px; }
.info h2{ margin-bottom:10px; }
.info p{ color:#bbb; line-height:1.7; }
.btn{ display:block; margin-top:15px; text-align:center;
background:linear-gradient(
135deg,
var(--accent),
var(--accent2)
);
color:white;
text-decoration:none;
padding:12px;
border-radius:10px;
font-weight:bold;
}
.footer{ text-align:center; color:#777; margin:40px 0; }
</style> </head>
<body>
<header>
<h1> HPGVH18 STUDIO</h1>
<p>Kho Game Visual Novel Việt Hóa</p>
</header>
<div class="container">
<input class="search" id="search" type="text" placeholder=" Tìm kiếm game...">
<div class="filters">
<button onclick="filterGames('all')"> Tất cả </button>
<button onclick="filterGames('pc')"> PC </button>
<button onclick="filterGames('android')"> Android </button>
</div>
<div class="games">
<div class="game-card" data-type="pc">
<img src="research-diary-cover.jpg" alt="Research Diary">
<div class="info">
<h2>Research Diary v0.1</h2>
<p> Nền tảng: PC Windows<br> Dung lượng: 420 MB<br> Phiên bản: v0.1 </p>
<a class="btn" href="research-diary.html">
XEM CHI TIẾT
</a>
</div>
</div>
</div>
<div class="footer">
© 2026 HPGVH18 Studio
</div>
</div>
<script>
const search = document.getElementById('search');
search.addEventListener('keyup',()=>{
const value = search.value.toLowerCase();
document .querySelectorAll('.game-card') .forEach(card=>{
const text = card.innerText.toLowerCase();
card.style.display =
text.includes(value)
? 'block'
3
'none';
});
});
function filterGames(type){
document .querySelectorAll('.game-card') .forEach(card=>{
if(type==='all'){
card.style.display='block';
return;
}
card.style.display =
card.dataset.type===type
? 'block'
'none';
});
}
</script>
</body> </html>
